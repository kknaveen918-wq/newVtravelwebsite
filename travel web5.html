<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE VOYAGES | Luxury Travel</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C8A96B',
                        ivory: '#FAF9F6',
                        beige: '#F5F1EB',
                        dark: '#111111',
                        grayText: '#6B7280',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-ivory text-dark antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence, useScroll, useTransform } = window.Motion;

        // --- CONFIGURATION ---
        const BRAND = {
            name: "LUMIÈRE VOYAGES",
            tagline: "Curated Journeys, Timeless Memories",
            developer: "Balamurgan" // REPLACE WITH YOUR NAME
        };

        // --- COMPONENTS ---

        // 1. Navigation
        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white/90 shadow-sm py-4' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <a href="#" className="text-2xl font-serif font-bold tracking-tighter text-dark">
                            {BRAND.name}
                        </a>

                        {/* Desktop Menu */}
                        <div className="hidden md:flex items-center space-x-8">
                            {['Destinations', 'Packages', 'Experiences', 'About'].map((item) => (
                                <a key={item} href={`#${item.toLowerCase()}`} className="text-xs font-medium text-dark hover:text-gold transition-colors uppercase tracking-widest">
                                    {item}
                                </a>
                            ))}
                            <button className="bg-dark text-white px-8 py-3 text-xs font-medium uppercase tracking-widest hover:bg-gold transition-colors duration-300">
                                Plan Your Trip
                            </button>
                        </div>

                        {/* Mobile Toggle */}
                        <button className="md:hidden text-dark" onClick={() => setMobileOpen(!mobileOpen)}>
                            {mobileOpen ? <i data-lucide="x"></i> : <i data-lucide="menu"></i>}
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {mobileOpen && (
                        <motion.div 
                            initial={{ opacity: 0, height: 0 }}
                            animate={{ opacity: 1, height: 'auto' }}
                            className="md:hidden bg-white border-t border-gray-100"
                        >
                            <div className="flex flex-col p-6 space-y-4">
                                {['Destinations', 'Packages', 'Experiences', 'About', 'Contact'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-lg font-serif text-dark" onClick={() => setMobileOpen(false)}>
                                        {item}
                                    </a>
                                ))}
                            </div>
                        </motion.div>
                    )}
                </nav>
            );
        };

        // 2. Hero Section
        const Hero = () => {
            return (
                <section className="relative h-screen w-full overflow-hidden flex items-center justify-center">
                    <div className="absolute inset-0 z-0">

                            src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=80&w=2070&auto=format&fit=crop" 
                            alt="Luxury Resort" 
                            className="w-full h-full object-cover"
                        />

                    </div>

                    <div className="container mx-auto px-6 relative z-10 pt-20 text-center">
                        <motion.span 
                            initial={{ opacity: 0, y: 20 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8 }}
                            className="block text-white/90 text-sm md:text-base uppercase tracking-[0.3em] mb-4"
                        >
                            Welcome to {BRAND.name}
                        </motion.span>
                        
                        <motion.h1 
                            initial={{ opacity: 0, y: 30 }}
                            animate={{ opacity: 1, y: 0 }}
                            transition={{ duration: 0.8, delay: 0.2 }}
                            className="text-5xl md:text-7xl lg:text-8xl font-serif text-white mb-6 leading-tight"

                            animate={{ opacity: 1, y: 0 }}

                                { label: "Date", placeholder: "When?" },
                                { label: "Guests", placeholder: "Who?" },

                                <div key={idx} className="flex-1 border-b border-gray-200 pb-2 hover:border-gold transition-colors group">
                                    <label className="text-[10px] uppercase tracking-widest text-gray-400 group-hover:text-gold block mb-1">{field.label}</label>
                                    <input type="text" placeholder={field.placeholder} className="w-full bg-transparent outline-none text-dark placeholder-gray-300 font-medium" />
                                </div>
                            ))}

                             <button className="border border-white text-white px-6 py-3 text-sm font-bold uppercase tracking-widest">Book Now</button>
                        </div>
                    </div>
                </section>
            );
        };

        // 3. Featured Destinations

                { name: "Santorini", tag: "Romantic", price: "$3,200", img: "https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?q=80&w=2094&auto=format&fit=crop" },
                { name: "Maldives", tag: "Secluded", price: "$5,500", img: "https://images.unsplash.com/photo-1514282401047-d79a71a590e8?q=80&w=1965&auto=format&fit=crop" },
                { name: "Kyoto", tag: "Cultural", price: "$4,100", img: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070&auto=format&fit=crop" },

                                        <div className="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 text-xs font-bold uppercase tracking-widest text-dark">
                                            {dest.tag}

                                    </div>
                                    <div className="p-6 flex justify-between items-center border-t border-gray-100">
                                        <div>
                                            <h3 className="text-2xl font-serif text-dark mb-1">{dest.name}</h3>
                                            <p className="text-grayText text-sm">Starting from {dest.price}</p>
                                        </div>
                                        <button className="text-dark hover:text-gold transition-colors">
                                            <i data-lucide="arrow-right" className="w-6 h-6"></i>
                                        </button>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // 4. Packages
        const Packages = () => {
            const packages = [
                { title: "Honeymoon Escape", duration: "7 Days / 7 Nights", price: "$5,200", features: ["Private Villa", "Couples Spa", "Champagne Dinner"] },
                { title: "European Grand Tour", duration: "12 Days / 11 Nights", price: "$8,900", features: ["First Class Train", "5-Star Hotels", "Private Guide"] },
                { title: "Safari Elite", duration: "5 Days / 4 Nights", price: "$6,500", features: ["Luxury Tents", "Game Drives", "Bush Dinners"] },

            return (

                    <div className="container mx-auto px-6">

                            <span className="text-gold uppercase tracking-[0.2em] text-sm font-semibold mb-3 block">Tailored for You</span>

                                    {idx === 1 && (
                                        <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-gold text-white px-4 py-1 text-xs uppercase tracking-widest">

                                        <h3 className="text-2xl font-serif text-dark mb-2">{pkg.title}</h3>
                                        <p className="text-grayText text-sm font-medium">{pkg.duration}</p>
                                    </div>
                                    
                                    <div className="flex-1 space-y-3 mb-8">
                                        {pkg.features.map((feature, i) => (
                                            <div key={i} className="flex items-center gap-3 text-sm text-gray-600">
                                                <i data-lucide="check" className="w-4 h-4 text-gold"></i>
                                                {feature}
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-auto pt-6 border-t border-gray-100 flex justify-between items-center">
                                        <span className="text-xl font-serif text-dark">{pkg.price}</span>
                                        <button className="text-sm font-bold uppercase tracking-widest hover:text-gold transition-colors">Book Now</button>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // 5. Why Choose Us
        const WhyUs = () => {
            const features = [
                { icon: "shield", title: "Trusted Experts", desc: "Decades of industry experience." },
                { icon: "award", title: "Premium Hotels", desc: "Access to 5-star properties." },
                { icon: "heart", title: "Curated Journeys", desc: "Handpicked for quality." },
                { icon: "zap", title: "24/7 Support", desc: "Always here when you need us." },

            return (
                <section className="py-20 bg-beige">

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            {features.map((f, i) => (
                                <motion.div 
                                    key={i}
                                    initial={{ opacity: 0, y: 20 }}
                                    whileInView={{ opacity: 1, y: 0 }}
                                    viewport={{ once: true }}
                                    transition={{ delay: i * 0.1 }}
                                    className="bg-white p-8 shadow-sm hover:shadow-md transition-shadow text-center"
                                >
                                    <div className="inline-flex items-center justify-center w-12 h-12 rounded-full bg-ivory text-gold mb-4">
                                        <i data-lucide={f.icon} className="w-6 h-6"></i>
                                    </div>
                                    <h3 className="text-lg font-serif font-bold mb-2">{f.title}</h3>
                                    <p className="text-grayText text-sm leading-relaxed">{f.desc}</p>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // 6. Experiences (Masonry-ish)
        const Experiences = () => {
            return (
                <section id="experiences" className="py-24 bg-white">
                    <div className="container mx-auto px-6">
                        <div className="flex flex-col md:flex-row justify-between items-end mb-12">
                            <div>
                                <span className="text-gold uppercase tracking-[0.2em] text-sm font-semibold mb-3 block">Beyond Ordinary</span>
                                <h2 className="text-4xl md:text-5xl font-serif text-dark">Exclusive Experiences</h2>
                            </div>
                            <button className="hidden md:block border-b border-dark pb-1 text-sm uppercase tracking-widest hover:text-gold hover:border-gold transition-colors">
                                View All Experiences
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="relative h-[500px] group overflow-hidden">
                                <img src="https://images.unsplash.com/photo-1544644181-1484b3fdfc62?q=80&w=2088&auto=format&fit=crop" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Yacht" />
                                <div className="absolute inset-0 bg-black/20 group-hover:bg-black/30 transition-colors"></div>
                                <div className="absolute bottom-8 left-8">
                                    <span className="text-white text-xs uppercase tracking-widest mb-2 block">Marine</span>
                                    <h3 className="text-3xl font-serif text-white mb-4">Private Yacht Charters</h3>
                                    <button className="text-white text-sm uppercase tracking-widest border-b border-white/50 pb-1 hover:border-gold hover:text-gold transition-colors">Learn More</button>
                                </div>
                            </div>
                            <div className="flex flex-col gap-6">
                                <div className="relative h-[240px] group overflow-hidden">
                                    <img src="https://images.unsplash.com/photo-1519046904884-53103b34b206?q=80&w=2070&auto=format&fit=crop" className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Dining" />

                                </div>

                                    <div className="absolute inset-0 bg-black/20 group-hover:bg-black/30 transition-colors"></div>
                                    <div className="absolute bottom-6 left-6">
                                        <span className="text-white text-xs uppercase tracking-widest mb-2 block">Wellness</span>
                                        <h3 className="text-xl font-serif text-white">Alpine Retreats</h3>
                                    </div>
                                </div>
                            </div>

        // 8. Testimonials
        const Testimonials = () => {

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {[1, 2, 3].map((i) => (
